<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>鳥合わせ</title>
  <meta name="theme-color" content="#e5f0e7">
  <meta name="description" content="野鳥の観察記録を入力して、今日見た鳥の一覧を作成するアプリです。">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main id="appContent" class="app-content">
  <header class="app-header">
    <h1>鳥合わせ</h1>
    <button type="button" onclick="clearAllChecks()">一から始める</button>
  </header>
  <div id="meta">


  <div>
    <label>日付：</label>
    <input type="date" id="obsDate">
    <label>開始：</label>
    <input type="time" id="obsStartTime">

    <label>終了：</label>
    <input type="time" id="obsEndTime">
  </div>

  <div>
    <label>場所：</label>
    <input type="text" id="obsPlace" placeholder="例：東京都○○公園">
  </div>

  <div>
    <label>天候：</label>
    <input type="text" id="obsWeather" placeholder="例：晴れ・曇">
  </div>

  <div>
    <label>観察者：</label>
    <input type="text" id="obsObserver" placeholder="氏名">
  </div>

  </div>

  <div id="birdSearch">
    <label for="birdSearchInput">鳥を検索：</label>
    <input type="search" id="birdSearchInput" placeholder="例：マガモ">
    <button id="clearBirdSearchBtn" type="button">クリア</button>
  </div>

  <ul id="birdList"></ul>
</main>

<section id="outputDrawer" class="output-drawer" aria-label="今日見た鳥">
  <button id="outputDrawerHandle" class="output-drawer__handle" type="button" aria-expanded="false" aria-controls="outputDrawerContent">
    <span class="output-drawer__bar"></span>
    <span>今日見た鳥</span>
  </button>

  <div id="outputDrawerContent" class="output-drawer__content">
    <div class="output-drawer__header">
      <strong>今日見た鳥</strong>
      <div class="output-drawer__actions">
        <button id="copyBtn" type="button">コピー</button>
      </div>
    </div>
    <pre id="output"></pre>
  </div>
</section>

<script src="app.js"></script>

</body>
</html>
